<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetaBuf Sol. — Innovation Meets Execution</title>
    <meta
      name="description"
      content="Premium software solutions agency specializing in AI, web, and mobile development. We craft premium digital experiences through innovation and execution."
    />
    <meta name="robots" content="index,follow" />

    <script>
      // Set initial theme before React renders to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved === 'light' || saved === 'dark' ? saved : prefersDark ? 'dark' : 'light';
          document.documentElement.classList.toggle('dark', theme === 'dark');
        } catch (e) {
          // If storage is blocked, fall back to system preference.
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', prefersDark);
        }
      })();
    </script>

    <link rel="canonical" href="https://metabufsol.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MetaBuf Sol. — Innovation Meets Execution" />
    <meta
      property="og:description"
      content="Premium software solutions agency specializing in AI, web, and mobile development."
    />
    <meta property="og:url" content="https://metabufsol.com/" />
